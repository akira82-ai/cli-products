# CLI Products Collection - Jekyll Configuration
# 站点信息
title: CLI Products Collection
description: 全面收集国内外提供 CLI 能力的产品工具，涵盖 20 个分类、170+ 个工具
author: akira82-ai
repository: akira82-ai/cli-products

# 主题配置
theme: just-the-docs
url: https://akira82-ai.github.io
baseurl: /cli-products

# 搜索配置
search_enabled: true
search_heading_level: 2
search_rel_url: false
search_button_text: "搜索..."
search_placeholder: "搜索 CLI 工具..."
search_results_label: "搜索结果"
search_no_results_text: "未找到相关内容"

# 辅助功能
heading_anchors: true
permalink: pretty
logo: "/assets/images/logo.svg"

# 导航配置（20个分类）
nav:
  - title: 首页
    url: /
  - title: 开发者实用工具
    url: /dev-utility/
    children:
      - title: 工具列表
        url: /dev-utility/
  - title: 包管理器/运行时
    url: /package-manager/
  - title: AI 工具
    url: /ai-tools/
  - title: 容器/编排
    url: /container/
  - title: 内容创建
    url: /content-creation/
  - title: 安全/密钥
    url: /security/
  - title: CI/CD
    url: /cicd/
  - title: 开发者平台
    url: /dev-platform/
  - title: 数据库
    url: /database/
  - title: HashiCorp 套件
    url: /hashicorp/
  - title: 基础设施即代码
    url: /iac/
  - title: 云服务商
    url: /cloud/
  - title: 通讯工具
    url: /communication/
  - title: 数据分析
    url: /data-analytics/
  - title: 通用工具
    url: /general-tools/
  - title: 开发工具
    url: /dev-tools/
  - title: 版本控制
    url: /version-control/
  - title: 设计/媒体
    url: /design-media/
  - title: 监控/可观测
    url: /monitoring/
  - title: 支付/电商
    url: /payment/

# 侧边栏配置
aux_links:
  "GitHub 仓库":
    - "//github.com/akira82-ai/cli-products"

aux_links_new_tab: true

# 深色模式配置
color_scheme: nil
enable_copy_code_button: true
heading_level: 2

# Google Fonts
fonts:
  - name: "Inter"
    family: "Inter"
    style: normal
    weight: 400 600 700
  - name: "JetBrains Mono"
    family: "JetBrains Mono"
    style: normal
    weight: 400 500

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - "*.py"
  - "*.pyc"
  - template.md
  - contributing.md
  - LICENSE

# Markdown 配置
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    default_lang: bash
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Front Matter 默认值
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "dev-utility"
