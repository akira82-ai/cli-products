# CLI Products Collection - Jekyll Configuration
# 站点信息
title: CLI Products Collection
description: 全面收集国内外提供 CLI 能力的产品工具，涵盖 20 个分类、170+ 个工具
author: akira82-ai
repository: akira82-ai/cli-products

# URL 配置
url: https://akira82-ai.github.io
baseurl: /cli-products

# Markdown 配置
markdown: kramdown
highlighter: rouge

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - "*.py"
  - "*.pyc"

# 永久链接格式
permalink: pretty

# Front Matter 默认值
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
