<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description | default: site.title }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --border-color: #e2e8f0;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #64748b;
      --border-color: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
    }

    .header {
      background: var(--gradient-primary);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.125rem;
    }

    .logo img {
      width: 32px;
      height: 32px;
    }

    .nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .nav a:hover {
      opacity: 1;
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .content {
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .content h2 {
      font-size: 1.75rem;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .content h3 {
      font-size: 1.375rem;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    .content p {
      margin-bottom: 1rem;
    }

    .content a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .content a:hover {
      text-decoration: underline;
    }

    .content code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-tertiary);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }

    .content pre {
      background: var(--bg-tertiary);
      padding: 1rem;
      border-radius: var(--radius-lg);
      overflow-x: auto;
      margin: 1rem 0;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .content th,
    .content td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .content th {
      background: var(--gradient-primary);
      color: white;
      font-weight: 600;
    }

    .content tr:last-child td {
      border-bottom: none;
    }

    .footer {
      background: var(--bg-secondary);
      padding: 2rem;
      text-align: center;
      margin-top: 4rem;
      border-top: 1px solid var(--border-color);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      margin: 0 1rem;
    }

    .footer a:hover {
      color: var(--primary);
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .nav {
        display: none;
      }

      .main {
        padding: 1rem;
      }

      .page-header h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="{{ '/' | relative_url }}" class="logo">
        <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="{{ site.title }}">
        <span>CLI Products</span>
      </a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <button class="theme-toggle" id="themeToggle">🌙 深色</button>
      </nav>
    </div>
  </header>

  <main class="main">
    {% if page.title %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
      </header>
    {% endif %}

    <div class="content">
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author }}. Released under the MIT License.</p>
    <p style="margin-top: 0.5rem;">
      <a href="{{ site.repository }}" target="_blank">GitHub</a>
    </p>
  </footer>

  <script>
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // 加载保存的主题
    const savedTheme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', savedTheme);
    updateThemeButton(savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    });

    function updateThemeButton(theme) {
      themeToggle.textContent = theme === 'dark' ? '☀️ 浅色' : '🌙 深色';
    }
  </script>
</body>
</html>
