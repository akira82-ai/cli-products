<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.title }} - {{ site.description }}">
  <title>{{ page.title }} - {{ site.title }}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --border-color: #e2e8f0;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #64748b;
      --border-color: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--gradient-primary);
      padding: 2rem 2rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(236, 72, 153, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(99, 102, 241, 0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    .header-content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: white;
    }

    .header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
    }

    .header-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.875rem;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      font-size: 0.8125rem;
      color: white;
    }

    /* Nav */
    .nav {
      background: var(--bg-secondary);
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }

    .logo img {
      width: 28px;
      height: 28px;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 0.875rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--bg-secondary);
    }

    /* Main */
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Content */
    .content {
      color: var(--text-secondary);
    }

    .content h2 {
      font-size: 1.5rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .content p {
      margin-bottom: 1rem;
    }

    .content a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .content a:hover {
      text-decoration: underline;
    }

    /* Table */
    .content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 2rem 0;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .content th,
    .content td {
      padding: 1rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .content th {
      background: var(--gradient-primary);
      color: white;
      font-weight: 600;
    }

    .content tr:last-child td {
      border-bottom: none;
    }

    .content tr:hover {
      background: var(--bg-tertiary);
    }

    .content code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-tertiary);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }

    .content pre {
      background: var(--bg-tertiary);
      padding: 1rem;
      border-radius: var(--radius-lg);
      overflow-x: auto;
      margin: 1rem 0;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    /* Footer */
    .footer {
      background: var(--bg-secondary);
      padding: 2rem;
      text-align: center;
      border-top: 1px solid var(--border-color);
      margin-top: 4rem;
    }

    .footer-copyright {
      color: var(--text-tertiary);
      font-size: 0.8125rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 1.5rem 1rem 2rem;
      }

      .main {
        padding: 1rem;
      }

      .content table {
        font-size: 0.875rem;
      }

      .content th,
      .content td {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="logo">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="{{ site.title }}">
      <span>CLI Products</span>
    </a>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </nav>

  <header class="header">
    <div class="header-content">
      <a href="{{ '/' | relative_url }}" class="back-link">← 返回首页</a>
      <h1>{{ page.title }}</h1>
      <div class="header-meta">
        <div class="meta-badge">
          <span>📁</span>
          <span>分类</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="content">
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    <p class="footer-copyright">&copy; {{ 'now' | date: '%Y' }} {{ site.author }}</p>
  </footer>

  <script>
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', savedTheme);
    updateThemeButton(savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    });

    function updateThemeButton(theme) {
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
  </script>
</body>
</html>
